AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for AWS HealthOmics resources and genomic data ingestion flow'

Parameters:
  Environment:
    Type: String
    Default: prodc
    Description: Environment name for resource naming
  
  S3BucketName:
    Type: String
    Description: Name of the S3 bucket for input files
    Default: genomic-data-prod

  WorkflowId:
    Type: String
    Description: ID of the HealthOmics workflow to trigger
    Default: "9500764"

Resources:
  #####################################
  # S3 Buckets
  #####################################
  
  InputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${S3BucketName}-${AWS::AccountId}-${Environment}"
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      ObjectLockEnabled: true

  FallbackBucket:
    Type: AWS::S3::Bucket
    DependsOn: InputBucket
    Properties:
      BucketName: !Sub "sequence-store-fallback-${AWS::AccountId}-${Environment}"
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      ObjectLockEnabled: true

  TestWorkshopBucket:
    Type: AWS::S3::Bucket
    DependsOn: InputBucket
    Properties:
      BucketName: !Sub "test-workshop-genovia-${AWS::AccountId}-${Environment}"
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  WorkflowOutputBucket:
    Type: AWS::S3::Bucket
    DependsOn: InputBucket
    Properties:
      BucketName: !Sub "workflow${WorkflowId}-output-bucket-${AWS::AccountId}-${Environment}"
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      ObjectLockEnabled: true

  #####################################
  # IAM Roles
  #####################################

  S3ToSequenceStoreLambdaRole:
    Type: AWS::IAM::Role
    DependsOn: InputBucket
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: OmicsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - omics:StartReadSetImportJob
                  - omics:GetReadSetImportJob
                  - omics:ListReadSetImportJobs
                Resource: '*'
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${S3BucketName}"
                  - !Sub "arn:aws:s3:::${S3BucketName}/*"

  HealthOmicsRole:
    Type: AWS::IAM::Role
    DependsOn: InputBucket
    Properties:
      RoleName: !Sub "HealthOmicsRole-${Environment}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: omics.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/AmazonOmicsFullAccess"
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt FallbackBucket.Arn
                  - !Sub "${FallbackBucket.Arn}/*"
                  - !GetAtt TestWorkshopBucket.Arn
                  - !Sub "${TestWorkshopBucket.Arn}/*"
                  - !GetAtt WorkflowOutputBucket.Arn
                  - !Sub "${WorkflowOutputBucket.Arn}/*"
                  - !Sub "arn:aws:s3:::${S3BucketName}"
                  - !Sub "arn:aws:s3:::${S3BucketName}/*"

  #####################################
  # Bucket Policies
  #####################################

  InputBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref InputBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowLambdaAccess
            Effect: Allow
            Principal:
              AWS: !GetAtt S3ToSequenceStoreLambdaRole.Arn
            Action:
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !GetAtt InputBucket.Arn
              - !Sub "${InputBucket.Arn}/*"
          - Sid: AllowOmicsService
            Effect: Allow
            Principal:
              Service: omics.amazonaws.com
            Action:
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !GetAtt InputBucket.Arn
              - !Sub "${InputBucket.Arn}/*"
          - Sid: EnforceSecureTransport
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !GetAtt InputBucket.Arn
              - !Sub "${InputBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: false

  FallbackBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FallbackBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowOmicsAccess
            Effect: Allow
            Principal:
              Service: omics.amazonaws.com
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
              - s3:DeleteObject
            Resource:
              - !Sub "arn:aws:s3:::${FallbackBucket}"
              - !Sub "arn:aws:s3:::${FallbackBucket}/*"
          - Sid: EnforceEncryptedTransport
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !Sub "arn:aws:s3:::${FallbackBucket}"
              - !Sub "arn:aws:s3:::${FallbackBucket}/*"
            Condition:
              Bool:
                aws:SecureTransport: false


  TestWorkshopBucketPolicy:
    DependsOn: 
      - TestWorkshopBucket
      - HealthOmicsRole
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref TestWorkshopBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowOmicsRoleAccess
            Effect: Allow
            Principal:
              AWS: !GetAtt HealthOmicsRole.Arn
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
            Resource:
              - !Sub "arn:aws:s3:::${TestWorkshopBucket}"
              - !Sub "arn:aws:s3:::${TestWorkshopBucket}/*"
          - Sid: EnforceEncryptedTransport
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !Sub "arn:aws:s3:::${TestWorkshopBucket}"
              - !Sub "arn:aws:s3:::${TestWorkshopBucket}/*"
            Condition:
              Bool:
                aws:SecureTransport: false


  WorkflowOutputBucketPolicy:
    DependsOn: 
      - WorkflowOutputBucket
      - HealthOmicsRole
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WorkflowOutputBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowOmicsRoleAccess
            Effect: Allow
            Principal:
              AWS: !GetAtt HealthOmicsRole.Arn
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
            Resource:
              - !Sub "arn:aws:s3:::${WorkflowOutputBucket}"
              - !Sub "arn:aws:s3:::${WorkflowOutputBucket}/*"
          - Sid: EnforceEncryptedTransport
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !Sub "arn:aws:s3:::${WorkflowOutputBucket}"
              - !Sub "arn:aws:s3:::${WorkflowOutputBucket}/*"
            Condition:
              Bool:
                aws:SecureTransport: false


  #####################################
  # HealthOmics Resources
  #####################################

  DefaultReferenceStore:
    Type: AWS::Omics::ReferenceStore
    DependsOn: InputBucket
    Properties:
      Name: !Sub "reference_store_${AWS::AccountId}_${Environment}"
      Description: !Sub "Default reference store for account ${AWS::AccountId} in ${Environment} environment"

  SequenceStore1:
    Type: AWS::Omics::SequenceStore
    DependsOn: InputBucket
    Properties:
      Name: !Sub "sequence_store_1_${AWS::AccountId}_${Environment}"
      Description: !Sub "Sequence store 1 for account ${AWS::AccountId} in ${Environment} environment"

  WorkflowSequenceStore:
    Type: AWS::Omics::SequenceStore
    DependsOn: 
      - InputBucket
      - HealthOmicsRole
    Properties:
      Name: !Sub "workflow_sequence_store_${AWS::AccountId}_${Environment}"
      Description: !Sub "Workflow sequence store for account ${AWS::AccountId} in ${Environment} environment"
      FallbackLocation: !Sub "s3://${FallbackBucket}/fallback/"

  TestWorkshopSequenceStore:
    Type: AWS::Omics::SequenceStore
    DependsOn:
      - InputBucket
      - HealthOmicsRole
    Properties:
      Name: !Sub "test_workshop_sequence_store_${AWS::AccountId}_${Environment}"
      Description: !Sub "Test workshop sequence store for account ${AWS::AccountId} in ${Environment} environment"
      FallbackLocation: !Sub "s3://${TestWorkshopBucket}/fallback/"

  VariantStore:
    Type: AWS::Omics::VariantStore
    DependsOn: 
      - InputBucket
    Properties:
      Name: !Sub "variant_store_${AWS::AccountId}_${Environment}"
      Description: !Sub "Variant Store for account ${AWS::AccountId} in ${Environment} environment"
      Reference:
        ReferenceArn: !GetAtt DefaultReferenceStore.Arn

  #####################################
  # Lambda Functions
  #####################################

  S3ToSequenceStoreTriggerFunction:
    Type: AWS::Lambda::Function
    DependsOn: 
      - InputBucket
    Properties:
      FunctionName: s3toSequenceStoreTriggerFunction
      Handler: lambda_function.lambda_handler
      Role: !GetAtt S3ToSequenceStoreLambdaRole.Arn
      Runtime: python3.13
      Timeout: 300
      MemorySize: 128
      Environment:
        Variables:
          SEQUENCE_STORE_ID: !Sub "workflow_sequence_store_${AWS::AccountId}_${Environment}"
          ROLE_ARN: !GetAtt S3ToSequenceStoreLambdaRole.Arn
      Code:
        ZipFile: |
          import boto3
          import json
          import os
          import urllib.parse

          omics = boto3.client('omics')
          s3 = boto3.client('s3')

          def verify_fastq_file(bucket, key):
              try:
                  response = s3.head_object(Bucket=bucket, Key=key)
                  print(f"Verifying file {key}:")
                  print(f"ContentLength: {response.get('ContentLength')}")
                  print(f"ContentType: {response.get('ContentType')}")
                  print(f"ETag: {response.get('ETag')}")
                  return True
              except Exception as e:
                  print(f"Error verifying {key}: {str(e)}")
                  return False

          def lambda_handler(event, context):
              try:
                  bucket = event['Records'][0]['s3']['bucket']['name']
                  key = urllib.parse.unquote_plus(event['Records'][0]['s3']['object']['key'], encoding='utf-8')
                  
                  if '.R1.' in key:
                      r1_key, r2_key = key, key.replace('.R1.', '.R2.')
                  else:
                      r1_key, r2_key = key.replace('.R2.', '.R1.'), key

                  # Verify both files exist and are accessible
                  print("\nVerifying files...")
                  if not verify_fastq_file(bucket, r1_key):
                      raise Exception(f"Failed to validate R1 file: {r1_key}")
                  if not verify_fastq_file(bucket, r2_key):
                      raise Exception(f"Failed to validate R2 file: {r2_key}")

                  # Try listing the bucket contents to verify access
                  print("\nListing bucket contents...")
                  s3_objects = s3.list_objects_v2(
                      Bucket=bucket,
                      Prefix=r1_key.split('/')[0]
                  )
                  print(f"Found {s3_objects.get('KeyCount')} objects with matching prefix")

                  import_request = {
                      'sequenceStoreId': os.environ['SEQUENCE_STORE_ID'],
                      'roleArn': os.environ['ROLE_ARN'],
                      'sources': [{
                          'sourceFiles': {
                              'source1': f's3://{bucket}/{r1_key}',
                              'source2': f's3://{bucket}/{r2_key}'
                          },
                          'name': r1_key.split('/')[-1].split('.R1.')[0],
                          'sourceFileType': 'FASTQ',
                          'subjectId': 'subject1',
                          'sampleId': 'sample1'
                      }]
                  }

                  print("\nImport request:", json.dumps(import_request, indent=2))
                  
                  response = omics.start_read_set_import_job(**import_request)
                  
                  return {
                      'statusCode': 200,
                      'body': json.dumps({
                          'message': 'Import job started successfully',
                          'jobId': response['id']
                      })
                  }
              
              except Exception as e:
                  print(f'Error: {str(e)}')
                  return {
                      'statusCode': 500,
                      'body': json.dumps({
                          'message': f'Error: {str(e)}'
                      })
                }
      Description: Trigger function for S3 events to import into Sequence Store

  #####################################
  # Lambda Permissions
  #####################################

  S3InvokeLambdaPermission:
    Type: AWS::Lambda::Permission
    DependsOn:
      - InputBucket
      - S3ToSequenceStoreTriggerFunction
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref S3ToSequenceStoreTriggerFunction
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub "arn:aws:s3:::${S3BucketName}"

  #####################################
  # Custom Resource for S3 Notifications
  #####################################

  NotificationConfigurationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "notification-config-function-${Environment}"
      Handler: index.handler
      Role: !GetAtt NotificationConfigurationRole.Arn
      Code:
        ZipFile: |
          import boto3
          import json
          import logging
          from botocore.exceptions import ClientError
          import cfnresponse

          # Set up logging
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def handler(event, context):
              logger.info(f"Received event: {json.dumps(event)}")
              
              try:
                  # Validate required properties
                  properties = event.get('ResourceProperties', {})
                  if 'BucketName' not in properties:
                      return cfnresponse.send(event, context, cfnresponse.FAILED, 
                          {'Error': 'Missing BucketName property'})
                  
                  bucket_name = properties['BucketName']
                  s3 = boto3.client('s3')

                  if event['RequestType'] in ['Create', 'Update']:
                      if 'NotificationConfiguration' not in properties:
                          return cfnresponse.send(event, context, cfnresponse.FAILED, 
                              {'Error': 'Missing NotificationConfiguration property'})
                      
                      notification_config = properties['NotificationConfiguration']
                      
                      # Ensure the configuration is a dictionary
                      if isinstance(notification_config, str):
                          notification_config = json.loads(notification_config)
                      
                      # Convert single Events string to list if needed
                      if 'LambdaFunctionConfigurations' in notification_config:
                          for config in notification_config['LambdaFunctionConfigurations']:
                              if isinstance(config.get('Events'), str):
                                  config['Events'] = [config['Events']]
                      
                      # Add empty lists for other notification types if not present
                      full_config = {
                          'LambdaFunctionConfigurations': notification_config.get('LambdaFunctionConfigurations', []),
                          'QueueConfigurations': notification_config.get('QueueConfigurations', []),
                          'TopicConfigurations': notification_config.get('TopicConfigurations', [])
                      }
                      
                      logger.info(f"Applying notification config: {json.dumps(full_config)}")
                      
                      try:
                          s3.put_bucket_notification_configuration(
                              Bucket=bucket_name,
                              NotificationConfiguration=full_config
                          )
                          logger.info("Successfully configured bucket notifications")
                          return cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      except ClientError as e:
                          logger.error(f"Failed to configure bucket notifications: {str(e)}")
                          return cfnresponse.send(event, context, cfnresponse.FAILED, 
                              {'Error': str(e)})
                  
                  elif event['RequestType'] == 'Delete':
                      try:
                          s3.put_bucket_notification_configuration(
                              Bucket=bucket_name,
                              NotificationConfiguration={
                                  'LambdaFunctionConfigurations': [],
                                  'QueueConfigurations': [],
                                  'TopicConfigurations': []
                              }
                          )
                          logger.info("Successfully removed bucket notifications")
                          return cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      except ClientError as e:
                          logger.error(f"Failed to remove bucket notifications: {str(e)}")
                          return cfnresponse.send(event, context, cfnresponse.FAILED, 
                              {'Error': str(e)})
                  
                  return cfnresponse.send(event, context, cfnresponse.FAILED, 
                      {'Error': f'Unknown RequestType: {event["RequestType"]}'})
              
              except Exception as e:
                  logger.error(f"Unexpected error: {str(e)}")
                  return cfnresponse.send(event, context, cfnresponse.FAILED, 
                      {'Error': str(e)})
      Runtime: python3.9
      Timeout: 300
      MemorySize: 128
    DependsOn:
         - S3ToSequenceStoreTriggerFunction


  NotificationConfigurationRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: S3NotificationAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutBucketNotification
                  - s3:GetBucketNotification
                Resource: !GetAtt InputBucket.Arn

  NotificationConfiguration:
    Type: Custom::S3BucketNotification
    DependsOn:
      - S3InvokeLambdaPermission
    Properties:
      ServiceToken: !GetAtt NotificationConfigurationFunction.Arn
      BucketName: !Ref InputBucket
      NotificationConfiguration:
        LambdaFunctionConfigurations:
          - Events: s3:ObjectCreated:*
            LambdaFunctionArn: !GetAtt S3ToSequenceStoreTriggerFunction.Arn

Outputs:
  InputBucketName:
    Description: Name of the input S3 bucket
    Value: !Ref InputBucket

  WorkflowSequenceStoreId:
    Description: ID of the workflow sequence store
    Value: !Ref WorkflowSequenceStore

  ReferenceStoreArn:
    Description: ARN of the Reference Store
    Value: !GetAtt DefaultReferenceStore.Arn

  SequenceStore1Arn:
    Description: ARN of the first Sequence Store
    Value: !Ref SequenceStore1

  WorkflowSequenceStoreArn:
    Description: ARN of the Workflow Sequence Store
    Value: !Ref WorkflowSequenceStore 

  TestWorkshopSequenceStoreArn:
    Description: ARN of the Test Workshop Sequence Store
    Value: !Ref TestWorkshopSequenceStore

  VariantStoreArn:
    Description: ARN of Variant Store 
    Value: !Ref VariantStore  # Changed from GetAtt to Ref temporarily

  FallbackBucketName:
    Description: Name of the Fallback S3 Bucket
    Value: !Ref FallbackBucket

  TestWorkshopBucketName:
    Description: Name of the Test Workshop S3 Bucket
    Value: !Ref TestWorkshopBucket