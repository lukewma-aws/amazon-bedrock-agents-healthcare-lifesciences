AWSTemplateFormatVersion: '2010-09-09'
Description: 'Enhanced Biomarker Application Infrastructure with HealthOmics Integration'

Parameters:
  ProjectName:
    Type: String
    Description: "Project name for resource tagging and naming"
    Default: "biomarker-app"
  
  Environment:
    Type: String
    Description: "Environment name (dev, staging, prod)"
    Default: "prod"
    AllowedValues:
      - "dev"
      - "staging" 
      - "prod"
  
  VpcId:
    Type: String
    Description: "VPC ID for Lambda functions"
    
  PrivateSubnetIds:
    Type: CommaDelimitedList
    Description: "Private subnet IDs for Lambda functions"
    
  DefaultSecurityGroupId:
    Type: String
    Description: "Default security group ID"
    Default: ""
    
  AgentRoleArn:
    Type: String
    Description: "ARN of the existing Bedrock agent role"

Resources:
  ##################################################################
  # KMS Key for encryption
  ##################################################################
  BiomarkerKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: "KMS key for biomarker application encryption"
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: Enable IAM User Permissions
            Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'kms:*'
            Resource: '*'
          - Sid: Allow use of the key for Lambda and Step Functions
            Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
                - states.amazonaws.com
                - s3.amazonaws.com
                - dynamodb.amazonaws.com
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: '*'
      Tags:
        - Key: Project
          Value: "hcls-agents-toolkit"
        - Key: Environment
          Value: !Ref Environment

  BiomarkerKMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${ProjectName}-${Environment}-key"
      TargetKeyId: !Ref BiomarkerKMSKey

  ##################################################################
  # S3 Buckets
  ##################################################################
  BiomarkerDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-data-${AWS::AccountId}-${AWS::Region}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref BiomarkerKMSKey
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA
              - TransitionInDays: 90
                StorageClass: GLACIER
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: "hcls-agents-toolkit"
        - Key: Environment
          Value: !Ref Environment

  ProcessedDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-processed-${AWS::AccountId}-${AWS::Region}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref BiomarkerKMSKey
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: "hcls-agents-toolkit"
        - Key: Environment
          Value: !Ref Environment

  ##################################################################
  # DynamoDB Tables
  ##################################################################
  BiomarkerMetadataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-metadata-${Environment}"
      BillingMode: ON_DEMAND
      AttributeDefinitions:
        - AttributeName: biomarker_id
          AttributeType: S
        - AttributeName: analysis_type
          AttributeType: S
      KeySchema:
        - AttributeName: biomarker_id
          KeyType: HASH
        - AttributeName: analysis_type
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
        KMSMasterKeyId: !Ref BiomarkerKMSKey
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Project
          Value: "hcls-agents-toolkit"
        - Key: Environment
          Value: !Ref Environment

  AnalysisResultsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-results-${Environment}"
      BillingMode: ON_DEMAND
      AttributeDefinitions:
        - AttributeName: analysis_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: analysis_id
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
        KMSMasterKeyId: !Ref BiomarkerKMSKey
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Project
          Value: "hcls-agents-toolkit"
        - Key: Environment
          Value: !Ref Environment

Outputs:
  BiomarkerKMSKeyId:
    Description: "KMS Key ID for biomarker application"
    Value: !Ref BiomarkerKMSKey
    Export:
      Name: !Sub "${AWS::StackName}-KMSKey"
      
  BiomarkerDataBucketName:
    Description: "S3 bucket for biomarker data storage"
    Value: !Ref BiomarkerDataBucket
    Export:
      Name: !Sub "${AWS::StackName}-DataBucket"
      
  ProcessedDataBucketName:
    Description: "S3 bucket for processed data storage"
    Value: !Ref ProcessedDataBucket
    Export:
      Name: !Sub "${AWS::StackName}-ProcessedBucket"
      
  BiomarkerMetadataTableName:
    Description: "DynamoDB table for biomarker metadata"
    Value: !Ref BiomarkerMetadataTable
    Export:
      Name: !Sub "${AWS::StackName}-MetadataTable"
      
  AnalysisResultsTableName:
    Description: "DynamoDB table for analysis results"
    Value: !Ref AnalysisResultsTable
    Export:
      Name: !Sub "${AWS::StackName}-ResultsTable"
