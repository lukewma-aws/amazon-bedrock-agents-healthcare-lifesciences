Transform: AWS::LanguageExtensions
Parameters:
  BedrockModelId:
    Type: String
    Description: The ID of the Foundation Model to use for the Agent
    Default: us.anthropic.claude-3-5-sonnet-20241022-v2:0
  RedshiftDatabaseName:
    Type: String
    Default: dev
  RedshiftUserName:
    Type: String
    Default: admin
  RedshiftPassword:
    Type: String
    NoEcho: true
    Description: STORE SECURELY - The password for the Redshift master user. Must
      be at least 8 characters long and contain at least one uppercase letter, one
      lowercase letter, and one number.
    MinLength: 8
    MaxLength: 64
    AllowedPattern: ^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)[a-zA-Z\d!@#$%^&*()_+\-=\[\]{};:'",.<>?]{8,64}$
    ConstraintDescription: Password must be between 8 and 64 characters, and contain
      at least one uppercase letter, one lowercase letter, and one number.
  GithubLink:
    Type: String
    Description: The link to the agent build cloudformation stack
    Default: https://github.com/aws-samples/amazon-bedrock-agents-healthcare-lifesciences.git
  GitBranch:
    Type: String
    Description: The github branch to clone
    Default: main
  ReactAppAllowedCidr:
    Type: String
    Description: Allowed CIDR block (X.X.X.X/X) for React App UI access
    AllowedPattern: ^(([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])\.){3}([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])(\/([0-9]|[1-2][0-9]|3[0-2]))$
    ConstraintDescription: Must be a valid CIDR block in format x.x.x.x/x
  TavilyApiKey:
    Type: String
    NoEcho: true
    Description: Provide TavilyApiKey API Key to utilize /web_search path
    Default: ''
  USPTOApiKey:
    Type: String
    NoEcho: true
    Description: Provide USPTO API Key to utilize /search path
    Default: ''
  DeployApplication:
    Type: String
    Description: Select true to deploy the react application and agents. Select false
      to only build the agents.
    Default: 'true'
    AllowedValues:
    - 'true'
    - 'false'
  ExistingVpcId:
    Type: String
    Description: The VPC ID of an existing VPC in your AWS account and current region
    Default: ''
  ExistingPublicSubnets:
    Type: CommaDelimitedList
    Description: A list of 2 public subnet IDs in your AWS account and AWS region
      from two different AZs are required.
    Default: ''
  ExistingPrivateSubnets:
    Type: CommaDelimitedList
    Description: A list of 2 private subnet IDs in your AWS account and AWS region
      from two different AZs are required.
    Default: ''
  EnableBiomarkerAppInfrastructure:
    Type: String
    Description: Deploy additional biomarker application infrastructure (API Gateway,
      Step Functions, additional Lambda functions)
    Default: 'true'
    AllowedValues:
    - 'true'
    - 'false'
  ProjectName:
    Type: String
    Description: Project name for resource tagging and naming
    Default: biomarker-app
  Environment:
    Type: String
    Description: Environment name (dev, staging, prod)
    Default: prod
    AllowedValues:
    - dev
    - staging
    - prod
  TemplateS3Bucket:
    Type: String
    Description: S3 bucket containing nested CloudFormation templates (leave empty
      to use relative paths for local deployment)
    Default: ''
  TemplateS3KeyPrefix:
    Type: String
    Description: S3 key prefix for nested templates (e.g., 'templates/' - include
      trailing slash)
    Default: ''
Conditions:
  HasVpcId:
    Fn::Not:
    - Fn::Equals:
      - Ref: ExistingVpcId
      - ''
  HasTwoPublicSubnets:
    Fn::Equals:
    - Fn::Length:
        Ref: ExistingPublicSubnets
    - 2
  HasTwoPrivateSubnets:
    Fn::Equals:
    - Fn::Length:
        Ref: ExistingPrivateSubnets
    - 2
  CreateNetworking:
    Fn::Not:
    - Fn::And:
      - Condition: HasVpcId
      - Condition: HasTwoPublicSubnets
      - Condition: HasTwoPrivateSubnets
  CreateWebSearchAgent:
    Fn::Not:
    - Fn::Equals:
      - Ref: TavilyApiKey
      - ''
  CreateUSPTOSearchAgent:
    Fn::Not:
    - Fn::Equals:
      - Ref: USPTOApiKey
      - ''
  CreateCompetitiveIntelAgent:
    Fn::Not:
    - Fn::Or:
      - Fn::Equals:
        - Ref: TavilyApiKey
        - ''
      - Fn::Equals:
        - Ref: USPTOApiKey
        - ''
  CreateReactApp:
    Fn::Equals:
    - Ref: DeployApplication
    - 'true'
  CreateBiomarkerAppInfrastructure:
    Fn::Equals:
    - Ref: EnableBiomarkerAppInfrastructure
    - 'true'
  HasTemplateS3Bucket:
    Fn::Not:
    - Fn::Equals:
      - Ref: TemplateS3Bucket
      - ''
Resources:
  Network:
    Type: AWS::CloudFormation::Stack
    Condition: CreateNetworking
    Properties:
      TemplateURL: https://s3.us-east-1.amazonaws.com/genovia-deployment/813deb18e11268e3bb34da3922a57599.template
      TimeoutInMinutes: 10
      Tags:
      - Key: Project
        Value: hcls-agents-toolkit
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: ${AWS::StackName}-${AWS::AccountId}-${AWS::Region}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: AES256
      Tags:
      - Key: Project
        Value: hcls-agents-toolkit
  BiomarkerKMSKey:
    Type: AWS::KMS::Key
    Condition: CreateBiomarkerAppInfrastructure
    Properties:
      Description: KMS key for biomarker application encryption
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
        - Sid: Enable IAM User Permissions
          Effect: Allow
          Principal:
            AWS:
              Fn::Sub: arn:aws:iam::${AWS::AccountId}:root
          Action: kms:*
          Resource: '*'
        - Sid: Allow use of the key for Lambda and Step Functions
          Effect: Allow
          Principal:
            Service:
            - lambda.amazonaws.com
            - states.amazonaws.com
            - s3.amazonaws.com
            - dynamodb.amazonaws.com
          Action:
          - kms:Encrypt
          - kms:Decrypt
          - kms:ReEncrypt*
          - kms:GenerateDataKey*
          - kms:DescribeKey
          Resource: '*'
      Tags:
      - Key: Project
        Value: hcls-agents-toolkit
      - Key: Environment
        Value:
          Ref: Environment
  BiomarkerKMSKeyAlias:
    Type: AWS::KMS::Alias
    Condition: CreateBiomarkerAppInfrastructure
    Properties:
      AliasName:
        Fn::Sub: alias/${ProjectName}-${Environment}-key
      TargetKeyId:
        Ref: BiomarkerKMSKey
  BiomarkerDataBucket:
    Type: AWS::S3::Bucket
    Condition: CreateBiomarkerAppInfrastructure
    Properties:
      BucketName:
        Fn::Sub: ${ProjectName}-data-${AWS::AccountId}-${AWS::Region}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: aws:kms
            KMSMasterKeyID:
              Ref: BiomarkerKMSKey
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
        - Id: TransitionToIA
          Status: Enabled
          Transitions:
          - TransitionInDays: 30
            StorageClass: STANDARD_IA
          - TransitionInDays: 90
            StorageClass: GLACIER
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
      - Key: Project
        Value: hcls-agents-toolkit
      - Key: Environment
        Value:
          Ref: Environment
  ProcessedDataBucket:
    Type: AWS::S3::Bucket
    Condition: CreateBiomarkerAppInfrastructure
    Properties:
      BucketName:
        Fn::Sub: ${ProjectName}-processed-${AWS::AccountId}-${AWS::Region}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: aws:kms
            KMSMasterKeyID:
              Ref: BiomarkerKMSKey
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
      - Key: Project
        Value: hcls-agents-toolkit
      - Key: Environment
        Value:
          Ref: Environment
  BiomarkerMetadataTable:
    Type: AWS::DynamoDB::Table
    Condition: CreateBiomarkerAppInfrastructure
    Properties:
      TableName:
        Fn::Sub: ${ProjectName}-metadata-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: biomarker_id
        AttributeType: S
      - AttributeName: analysis_type
        AttributeType: S
      KeySchema:
      - AttributeName: biomarker_id
        KeyType: HASH
      - AttributeName: analysis_type
        KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId:
          Ref: BiomarkerKMSKey
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
      - Key: Project
        Value: hcls-agents-toolkit
      - Key: Environment
        Value:
          Ref: Environment
  AnalysisResultsTable:
    Type: AWS::DynamoDB::Table
    Condition: CreateBiomarkerAppInfrastructure
    Properties:
      TableName:
        Fn::Sub: ${ProjectName}-results-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: analysis_id
        AttributeType: S
      - AttributeName: timestamp
        AttributeType: S
      KeySchema:
      - AttributeName: analysis_id
        KeyType: HASH
      - AttributeName: timestamp
        KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId:
          Ref: BiomarkerKMSKey
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
      - Key: Project
        Value: hcls-agents-toolkit
      - Key: Environment
        Value:
          Ref: Environment
  BiomarkerLambdaRole:
    Type: AWS::IAM::Role
    Condition: CreateBiomarkerAppInfrastructure
    Properties:
      RoleName:
        Fn::Sub: ${ProjectName}-lambda-role-${Environment}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Principal:
            Service: lambda.amazonaws.com
          Action: sts:AssumeRole
      ManagedPolicyArns:
      - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
      - PolicyName: BiomarkerLambdaPolicy
        PolicyDocument:
          Version: '2012-10-17'
          Statement:
          - Effect: Allow
            Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
            - s3:ListBucket
            Resource:
            - Fn::GetAtt:
              - BiomarkerDataBucket
              - Arn
            - Fn::GetAtt:
              - ProcessedDataBucket
              - Arn
            - Fn::Sub: arn:aws:s3:::${BiomarkerDataBucket}/*
            - Fn::Sub: arn:aws:s3:::${ProcessedDataBucket}/*
          - Effect: Allow
            Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
            Resource:
            - Fn::GetAtt:
              - BiomarkerMetadataTable
              - Arn
            - Fn::GetAtt:
              - AnalysisResultsTable
              - Arn
          - Effect: Allow
            Action:
            - bedrock:InvokeAgent
            - bedrock:InvokeModel
            - bedrock:GetAgent
            - bedrock:ListAgents
            Resource:
            - Fn::Sub: arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:agent/*
            - Fn::Sub: arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:agent-alias/*
            - Fn::Sub: arn:aws:bedrock:*::foundation-model/*
          - Effect: Allow
            Action:
            - omics:GetVariantStore
            - omics:ListVariantStores
            - omics:ListVariantImportJobs
            - omics:GetVariantImportJob
            - omics:GetAnnotationStore
            - omics:ListAnnotationStores
            - omics:GetReferenceStore
            - omics:ListReferenceStores
            - omics:GetWorkflow
            - omics:ListWorkflows
            - omics:GetRun
            - omics:ListRuns
            Resource: '*'
          - Effect: Allow
            Action:
            - kms:Encrypt
            - kms:Decrypt
            - kms:ReEncrypt*
            - kms:GenerateDataKey*
            - kms:DescribeKey
            Resource:
              Fn::GetAtt:
              - BiomarkerKMSKey
              - Arn
          - Effect: Allow
            Action:
            - states:StartExecution
            - states:DescribeExecution
            - states:StopExecution
            Resource:
              Fn::Sub: arn:aws:states:${AWS::Region}:${AWS::AccountId}:stateMachine:${ProjectName}-*
          - Effect: Allow
            Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
            Resource:
              Fn::Sub: arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*
      Tags:
      - Key: Project
        Value: hcls-agents-toolkit
      - Key: Environment
        Value:
          Ref: Environment
  ScientificLiteratureSearchFunction:
    Type: AWS::Lambda::Function
    Condition: CreateBiomarkerAppInfrastructure
    Properties:
      FunctionName:
        Fn::Sub: ${ProjectName}-literature-search-${Environment}
      Runtime: python3.11
      Handler: index.lambda_handler
      Role:
        Fn::GetAtt:
        - BiomarkerLambdaRole
        - Arn
      Timeout: 300
      MemorySize: 1024
      Environment:
        Variables:
          METADATA_TABLE:
            Ref: BiomarkerMetadataTable
          RESULTS_TABLE:
            Ref: AnalysisResultsTable
          DATA_BUCKET:
            Ref: BiomarkerDataBucket
          KMS_KEY_ID:
            Ref: BiomarkerKMSKey
      VpcConfig:
        SecurityGroupIds:
        - Fn::If:
          - CreateNetworking
          - Fn::GetAtt:
            - Network
            - Outputs.DefaultSecurityGroup
          - Ref: AWS::NoValue
        SubnetIds:
        - Fn::If:
          - CreateNetworking
          - Fn::GetAtt:
            - Network
            - Outputs.PrivateSubnet1
          - Fn::Select:
            - 0
            - Ref: ExistingPrivateSubnets
        - Fn::If:
          - CreateNetworking
          - Fn::GetAtt:
            - Network
            - Outputs.PrivateSubnet2
          - Fn::Select:
            - 1
            - Ref: ExistingPrivateSubnets
      Code:
        ZipFile: "import json\nimport boto3\nimport os\nimport requests\nfrom datetime\
          \ import datetime\nimport uuid\n\ndef lambda_handler(event, context):\n\
          \    \"\"\"\n    Scientific literature search function that integrates with\
          \ PubMed API\n    and uses Bedrock agents for analysis\n    \"\"\"\n   \
          \ try:\n        # Initialize AWS clients\n        bedrock_runtime = boto3.client('bedrock-agent-runtime')\n\
          \        dynamodb = boto3.resource('dynamodb')\n        s3 = boto3.client('s3')\n\
          \        \n        # Get environment variables\n        metadata_table =\
          \ dynamodb.Table(os.environ['METADATA_TABLE'])\n        results_table =\
          \ dynamodb.Table(os.environ['RESULTS_TABLE'])\n        data_bucket = os.environ['DATA_BUCKET']\n\
          \        \n        # Parse input\n        query = event.get('query', '')\n\
          \        biomarker = event.get('biomarker', '')\n        max_results = event.get('max_results',\
          \ 10)\n        \n        if not query and not biomarker:\n            return\
          \ {\n                'statusCode': 400,\n                'body': json.dumps({'error':\
          \ 'Query or biomarker parameter required'})\n            }\n        \n \
          \       # Search PubMed\n        search_term = query if query else f\"{biomarker}\
          \ biomarker cancer\"\n        pubmed_results = search_pubmed(search_term,\
          \ max_results)\n        \n        # Store results in DynamoDB\n        analysis_id\
          \ = str(uuid.uuid4())\n        timestamp = datetime.utcnow().isoformat()\n\
          \        \n        # Store metadata\n        metadata_table.put_item(\n\
          \            Item={\n                'biomarker_id': biomarker or 'literature_search',\n\
          \                'analysis_type': 'literature_search',\n               \
          \ 'analysis_id': analysis_id,\n                'timestamp': timestamp,\n\
          \                'query': search_term,\n                'status': 'completed'\n\
          \            }\n        )\n        \n        # Store results\n        results_table.put_item(\n\
          \            Item={\n                'analysis_id': analysis_id,\n     \
          \           'timestamp': timestamp,\n                'results': pubmed_results,\n\
          \                'result_count': len(pubmed_results),\n                'ttl':\
          \ int((datetime.utcnow().timestamp() + 86400 * 30))  # 30 days TTL\n   \
          \         }\n        )\n        \n        return {\n            'statusCode':\
          \ 200,\n            'body': json.dumps({\n                'analysis_id':\
          \ analysis_id,\n                'results': pubmed_results,\n           \
          \     'count': len(pubmed_results)\n            })\n        }\n        \n\
          \    except Exception as e:\n        print(f\"Error: {str(e)}\")\n     \
          \   return {\n            'statusCode': 500,\n            'body': json.dumps({'error':\
          \ str(e)})\n        }\n\ndef search_pubmed(query, max_results=10):\n   \
          \ \"\"\"Search PubMed for scientific literature\"\"\"\n    try:\n      \
          \  # PubMed E-utilities API\n        base_url = \"https://eutils.ncbi.nlm.nih.gov/entrez/eutils/\"\
          \n        \n        # Search for article IDs\n        search_url = f\"{base_url}esearch.fcgi\"\
          \n        search_params = {\n            'db': 'pubmed',\n            'term':\
          \ query,\n            'retmax': max_results,\n            'retmode': 'json'\n\
          \        }\n        \n        search_response = requests.get(search_url,\
          \ params=search_params)\n        search_data = search_response.json()\n\
          \        \n        if 'esearchresult' not in search_data or 'idlist' not\
          \ in search_data['esearchresult']:\n            return []\n        \n  \
          \      ids = search_data['esearchresult']['idlist']\n        \n        if\
          \ not ids:\n            return []\n        \n        # Fetch article details\n\
          \        fetch_url = f\"{base_url}efetch.fcgi\"\n        fetch_params =\
          \ {\n            'db': 'pubmed',\n            'id': ','.join(ids),\n   \
          \         'retmode': 'xml'\n        }\n        \n        fetch_response\
          \ = requests.get(fetch_url, params=fetch_params)\n        \n        # Parse\
          \ XML response (simplified)\n        articles = []\n        for pmid in\
          \ ids:\n            articles.append({\n                'pmid': pmid,\n \
          \               'title': f\"Article {pmid}\",\n                'abstract':\
          \ \"Abstract not available in this demo\",\n                'url': f\"https://pubmed.ncbi.nlm.nih.gov/{pmid}/\"\
          \n            })\n        \n        return articles\n        \n    except\
          \ Exception as e:\n        print(f\"PubMed search error: {str(e)}\")\n \
          \       return []\n"
      Tags:
      - Key: Project
        Value: hcls-agents-toolkit
      - Key: Environment
        Value:
          Ref: Environment
  DataProcessingFunction:
    Type: AWS::Lambda::Function
    Condition: CreateBiomarkerAppInfrastructure
    Properties:
      FunctionName:
        Fn::Sub: ${ProjectName}-data-processing-${Environment}
      Runtime: python3.11
      Handler: index.lambda_handler
      Role:
        Fn::GetAtt:
        - BiomarkerLambdaRole
        - Arn
      Timeout: 900
      MemorySize: 2048
      Environment:
        Variables:
          METADATA_TABLE:
            Ref: BiomarkerMetadataTable
          RESULTS_TABLE:
            Ref: AnalysisResultsTable
          DATA_BUCKET:
            Ref: BiomarkerDataBucket
          PROCESSED_BUCKET:
            Ref: ProcessedDataBucket
          KMS_KEY_ID:
            Ref: BiomarkerKMSKey
      VpcConfig:
        SecurityGroupIds:
        - Fn::If:
          - CreateNetworking
          - Fn::GetAtt:
            - Network
            - Outputs.DefaultSecurityGroup
          - Ref: AWS::NoValue
        SubnetIds:
        - Fn::If:
          - CreateNetworking
          - Fn::GetAtt:
            - Network
            - Outputs.PrivateSubnet1
          - Fn::Select:
            - 0
            - Ref: ExistingPrivateSubnets
        - Fn::If:
          - CreateNetworking
          - Fn::GetAtt:
            - Network
            - Outputs.PrivateSubnet2
          - Fn::Select:
            - 1
            - Ref: ExistingPrivateSubnets
      Code:
        ZipFile: "import json\nimport boto3\nimport os\nimport pandas as pd\nfrom\
          \ io import StringIO\nimport uuid\nfrom datetime import datetime\n\ndef\
          \ lambda_handler(event, context):\n    \"\"\"\n    Data processing function\
          \ for biomarker analysis\n    \"\"\"\n    try:\n        # Initialize AWS\
          \ clients\n        s3 = boto3.client('s3')\n        dynamodb = boto3.resource('dynamodb')\n\
          \        stepfunctions = boto3.client('stepfunctions')\n        \n     \
          \   # Get environment variables\n        metadata_table = dynamodb.Table(os.environ['METADATA_TABLE'])\n\
          \        results_table = dynamodb.Table(os.environ['RESULTS_TABLE'])\n \
          \       data_bucket = os.environ['DATA_BUCKET']\n        processed_bucket\
          \ = os.environ['PROCESSED_BUCKET']\n        \n        # Parse input\n  \
          \      if 'Records' in event:\n            # S3 trigger\n            for\
          \ record in event['Records']:\n                bucket = record['s3']['bucket']['name']\n\
          \                key = record['s3']['object']['key']\n                process_s3_file(s3,\
          \ bucket, key, processed_bucket, metadata_table, results_table)\n      \
          \  else:\n            # Direct invocation\n            data = event.get('data',\
          \ {})\n            analysis_type = event.get('analysis_type', 'general')\n\
          \            result = process_biomarker_data(data, analysis_type)\n    \
          \        \n            # Store results\n            analysis_id = str(uuid.uuid4())\n\
          \            timestamp = datetime.utcnow().isoformat()\n            \n \
          \           metadata_table.put_item(\n                Item={\n         \
          \           'biomarker_id': data.get('biomarker_id', 'unknown'),\n     \
          \               'analysis_type': analysis_type,\n                    'analysis_id':\
          \ analysis_id,\n                    'timestamp': timestamp,\n          \
          \          'status': 'completed'\n                }\n            )\n   \
          \         \n            results_table.put_item(\n                Item={\n\
          \                    'analysis_id': analysis_id,\n                    'timestamp':\
          \ timestamp,\n                    'results': result,\n                 \
          \   'ttl': int((datetime.utcnow().timestamp() + 86400 * 30))\n         \
          \       }\n            )\n            \n            return {\n         \
          \       'statusCode': 200,\n                'body': json.dumps({\n     \
          \               'analysis_id': analysis_id,\n                    'results':\
          \ result\n                })\n            }\n        \n        return {\n\
          \            'statusCode': 200,\n            'body': json.dumps({'message':\
          \ 'Processing completed'})\n        }\n        \n    except Exception as\
          \ e:\n        print(f\"Error: {str(e)}\")\n        return {\n          \
          \  'statusCode': 500,\n            'body': json.dumps({'error': str(e)})\n\
          \        }\n\ndef process_s3_file(s3, bucket, key, processed_bucket, metadata_table,\
          \ results_table):\n    \"\"\"Process a file from S3\"\"\"\n    try:\n  \
          \      # Download file\n        response = s3.get_object(Bucket=bucket,\
          \ Key=key)\n        content = response['Body'].read().decode('utf-8')\n\
          \        \n        # Process based on file type\n        if key.endswith('.csv'):\n\
          \            df = pd.read_csv(StringIO(content))\n            result = analyze_csv_data(df)\n\
          \        elif key.endswith('.json'):\n            data = json.loads(content)\n\
          \            result = analyze_json_data(data)\n        else:\n         \
          \   result = {'message': 'File type not supported for automated processing'}\n\
          \        \n        # Save processed result\n        processed_key = f\"\
          processed/{key}.json\"\n        s3.put_object(\n            Bucket=processed_bucket,\n\
          \            Key=processed_key,\n            Body=json.dumps(result),\n\
          \            ServerSideEncryption='aws:kms',\n            SSEKMSKeyId=os.environ['KMS_KEY_ID']\n\
          \        )\n        \n        # Store metadata\n        analysis_id = str(uuid.uuid4())\n\
          \        timestamp = datetime.utcnow().isoformat()\n        \n        metadata_table.put_item(\n\
          \            Item={\n                'biomarker_id': key,\n            \
          \    'analysis_type': 'file_processing',\n                'analysis_id':\
          \ analysis_id,\n                'timestamp': timestamp,\n              \
          \  'source_file': f\"s3://{bucket}/{key}\",\n                'processed_file':\
          \ f\"s3://{processed_bucket}/{processed_key}\",\n                'status':\
          \ 'completed'\n            }\n        )\n        \n    except Exception\
          \ as e:\n        print(f\"Error processing file {key}: {str(e)}\")\n\ndef\
          \ process_biomarker_data(data, analysis_type):\n    \"\"\"Process biomarker\
          \ data\"\"\"\n    # Placeholder for biomarker analysis logic\n    return\
          \ {\n        'analysis_type': analysis_type,\n        'processed_at': datetime.utcnow().isoformat(),\n\
          \        'summary': 'Data processed successfully',\n        'data_points':\
          \ len(data) if isinstance(data, list) else 1\n    }\n\ndef analyze_csv_data(df):\n\
          \    \"\"\"Analyze CSV data\"\"\"\n    return {\n        'rows': len(df),\n\
          \        'columns': len(df.columns),\n        'column_names': df.columns.tolist(),\n\
          \        'summary_stats': df.describe().to_dict() if not df.empty else {}\n\
          \    }\n\ndef analyze_json_data(data):\n    \"\"\"Analyze JSON data\"\"\"\
          \n    return {\n        'data_type': type(data).__name__,\n        'keys':\
          \ list(data.keys()) if isinstance(data, dict) else [],\n        'length':\
          \ len(data) if hasattr(data, '__len__') else 0\n    }\n"
      Tags:
      - Key: Project
        Value: hcls-agents-toolkit
      - Key: Environment
        Value:
          Ref: Environment
  BiomarkerAnalysisStateMachine:
    Type: AWS::StepFunctions::StateMachine
    Condition: CreateBiomarkerAppInfrastructure
    Properties:
      StateMachineName:
        Fn::Sub: ${ProjectName}-analysis-workflow-${Environment}
      RoleArn:
        Fn::GetAtt:
        - StepFunctionsRole
        - Arn
      DefinitionString:
        Fn::Sub: "{\n  \"Comment\": \"Biomarker analysis workflow\",\n  \"StartAt\"\
          : \"ProcessData\",\n  \"States\": {\n    \"ProcessData\": {\n      \"Type\"\
          : \"Task\",\n      \"Resource\": \"${DataProcessingFunction.Arn}\",\n  \
          \    \"Next\": \"SearchLiterature\",\n      \"Retry\": [\n        {\n  \
          \        \"ErrorEquals\": [\"States.TaskFailed\"],\n          \"IntervalSeconds\"\
          : 2,\n          \"MaxAttempts\": 3,\n          \"BackoffRate\": 2.0\n  \
          \      }\n      ]\n    },\n    \"SearchLiterature\": {\n      \"Type\":\
          \ \"Task\",\n      \"Resource\": \"${ScientificLiteratureSearchFunction.Arn}\"\
          ,\n      \"Next\": \"AnalysisComplete\",\n      \"Retry\": [\n        {\n\
          \          \"ErrorEquals\": [\"States.TaskFailed\"],\n          \"IntervalSeconds\"\
          : 2,\n          \"MaxAttempts\": 3,\n          \"BackoffRate\": 2.0\n  \
          \      }\n      ]\n    },\n    \"AnalysisComplete\": {\n      \"Type\":\
          \ \"Succeed\",\n      \"Comment\": \"Analysis workflow completed successfully\"\
          \n    }\n  }\n}\n"
      Tags:
      - Key: Project
        Value: hcls-agents-toolkit
      - Key: Environment
        Value:
          Ref: Environment
