AWSTemplateFormatVersion: "2010-09-09"
Description: Creates the Literature Curator Agent for retrieving and summarizing insights from scientific literature using PubMed APIs and Amazon Bedrock Knowledge Bases.

Parameters:
  AgentAliasName:
    Type: String
    Default: "Latest"
    Description: Name for the agent alias
  BedrockModelId:
    Type: String
    Description: "The ID of the Foundation Model to use for the Agent"
    Default: "us.anthropic.claude-3-5-sonnet-20241022-v2:0"
  AgentIAMRoleArn:
    Type: String
    Description: "(Optional) Amazon Bedrock Agents service role ARN"
    Default: ""
  KnowledgeBaseId:
    Type: String
    Description: "(Optional) Knowledge Base ID for RAG functionality"
    Default: ""

Conditions:
  CreateAgentAliasCondition: !Not [!Equals [!Ref AgentAliasName, ""]]
  AgentIAMRoleCondition: !Not [!Equals [!Ref AgentIAMRoleArn, ""]]
  KnowledgeBaseCondition: !Not [!Equals [!Ref KnowledgeBaseId, ""]]

Resources:
  ##################################################################
  # Lambda Function for Literature Curation
  ##################################################################
  
  LiteratureCurationFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LiteratureCurationPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              - Effect: Allow
                Action:
                  - bedrock:RetrieveAndGenerate
                  - bedrock:Retrieve
                Resource: '*'
                Condition:
                  !If
                    - KnowledgeBaseCondition
                    - StringEquals:
                        'bedrock:KnowledgeBaseId': !Ref KnowledgeBaseId
                    - !Ref AWS::NoValue

  LiteratureCurationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "lit-search-${AWS::AccountId}"
      Runtime: python3.11
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LiteratureCurationFunctionRole.Arn
      Timeout: 300
      MemorySize: 1024
      Environment:
        Variables:
          PUBMED_BASE_URL: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/"
          MAX_RESULTS: "50"
          KNOWLEDGE_BASE_ID: !Ref KnowledgeBaseId
      Code: "action-groups/literature-search"
      Tags:
        - Key: Project
          Value: "hcls-agents-toolkit"
        - Key: Agent
          Value: "literature-curator"

  LiteratureCurationFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref LiteratureCurationFunction
      Principal: bedrock.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:agent/*"

  ##################################################################
  # Bedrock Agent
  ##################################################################
  
  LiteratureCuratorBedrockAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      AgentName: !Sub "${AWS::StackName}-literature-curator"
      Description: "Agent specialized in curating and analyzing scientific literature for healthcare and life sciences research"
      FoundationModel: !Ref BedrockModelId
      AgentResourceRoleArn:
        "Fn::If":
          - AgentIAMRoleCondition
          - !Ref AgentIAMRoleArn
          - "{{resolve:ssm:/bedrock/agent/role/arn:1}}"
      Instruction: |
        You are a Literature Curator Agent specialized in healthcare and life sciences research. Your primary role is to:

        1. **Search and Retrieve**: Find relevant scientific literature from PubMed and other databases
        2. **Analyze and Curate**: Evaluate the quality, relevance, and credibility of research papers
        3. **Summarize Findings**: Provide concise summaries of key research findings
        4. **Identify Trends**: Recognize patterns and emerging trends in the literature
        5. **Quality Assessment**: Assess the methodological quality and statistical significance of studies

        Key capabilities:
        - Search PubMed using advanced query techniques
        - Filter results by publication date, journal impact factor, and study type
        - Extract key information including study design, sample size, outcomes, and conclusions
        - Identify systematic reviews, meta-analyses, and high-quality clinical trials
        - Provide citation information in standard formats
        - Flag potential conflicts of interest or study limitations

        When responding:
        - Always provide source citations with PMID numbers
        - Indicate the level of evidence (e.g., systematic review, RCT, observational study)
        - Highlight any limitations or potential biases in the research
        - Suggest related search terms or areas for further investigation
        - Prioritize recent, high-quality publications from reputable journals

        Focus areas include biomarker discovery, clinical trials, precision medicine, genomics, and therapeutic interventions.
      ActionGroups:
        - ActionGroupName: "literature-search"
          Description: "Search and curate scientific literature"
          ActionGroupExecutor:
            Lambda: !GetAtt LiteratureCurationFunction.Arn
          ApiSchema:
            Payload: |
              {
                "openapi": "3.0.0",
                "info": {
                  "title": "Literature Curation API",
                  "version": "1.0.0",
                  "description": "API for searching and curating scientific literature"
                },
                "paths": {
                  "/search": {
                    "post": {
                      "summary": "Search and curate scientific literature",
                      "description": "Search PubMed for scientific articles and provide curated results with relevance scoring",
                      "operationId": "searchLiterature",
                      "requestBody": {
                        "required": true,
                        "content": {
                          "application/json": {
                            "schema": {
                              "type": "object",
                              "properties": {
                                "query": {
                                  "type": "string",
                                  "description": "Search query for PubMed"
                                },
                                "max_results": {
                                  "type": "integer",
                                  "description": "Maximum number of results to return",
                                  "default": 20
                                },
                                "search_type": {
                                  "type": "string",
                                  "description": "Type of search (general, biomarker, clinical_trial, review)",
                                  "default": "general"
                                }
                              },
                              "required": ["query"]
                            }
                          }
                        }
                      },
                      "responses": {
                        "200": {
                          "description": "Successful literature search and curation",
                          "content": {
                            "application/json": {
                              "schema": {
                                "type": "object",
                                "properties": {
                                  "query": {"type": "string"},
                                  "total_results": {"type": "integer"},
                                  "curated_results": {
                                    "type": "object",
                                    "properties": {
                                      "high_relevance": {"type": "array"},
                                      "medium_relevance": {"type": "array"},
                                      "low_relevance": {"type": "array"},
                                      "summary": {"type": "object"}
                                    }
                                  },
                                  "search_timestamp": {"type": "string"}
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
      Tags:
        Project: "hcls-agents-toolkit"
        Agent: "literature-curator"
      KnowledgeBases:
        "Fn::If":
          - KnowledgeBaseCondition
          - - KnowledgeBaseId: !Ref KnowledgeBaseId
              Description: "Internal literature evidence database"
              KnowledgeBaseState: "ENABLED"
          - !Ref "AWS::NoValue"

  AgentAliasResource:
    Type: AWS::Bedrock::AgentAlias
    Condition: CreateAgentAliasCondition
    Properties:
      AgentId: !GetAtt LiteratureCuratorBedrockAgent.AgentId
      AgentAliasName: !Ref AgentAliasName

Outputs:
  AgentId:
    Description: Agent ID
    Value: !Ref LiteratureCuratorBedrockAgent
  AgentAliasId:
    Description: Agent Alias ID
    Value: !GetAtt AgentAliasResource.AgentAliasId
    Condition: CreateAgentAliasCondition
  AgentAliasArn:
    Description: Agent Alias ARN
    Value: !GetAtt AgentAliasResource.AgentAliasArn
    Condition: CreateAgentAliasCondition
  LambdaFunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt LiteratureCurationFunction.Arn
