AWSTemplateFormatVersion: "2010-09-09"
Description: Creates the Athena SQL Generator Agent for analyzing data lakes by converting natural language questions to SQL statements and executing them on Amazon Athena.

Parameters:
  AgentAliasName:
    Type: String
    Default: "Latest"
    Description: Name for the agent alias
  BedrockModelId:
    Type: String
    Description: "The ID of the Foundation Model to use for the Agent"
    Default: "us.anthropic.claude-3-5-sonnet-20241022-v2:0"
  
  AthenaWorkgroup:
    Type: String
    Description: "Athena workgroup to use for queries"
    Default: "primary"
  
  AthenaResultsBucket:
    Type: String
    Description: "S3 bucket for Athena query results"
  
  AgentIAMRoleArn:
    Type: String
    Description: "(Optional) Amazon Bedrock Agents service role ARN"
    Default: ""

Conditions:
  CreateAgentAliasCondition: !Not [!Equals [!Ref AgentAliasName, ""]]
  AgentIAMRoleCondition: !Not [!Equals [!Ref AgentIAMRoleArn, ""]]

Resources:
  ##################################################################
  # Lambda Function for Athena SQL Generation and Execution
  ##################################################################
  
  AthenaSQLGeneratorFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AthenaAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - athena:StartQueryExecution
                  - athena:GetQueryExecution
                  - athena:GetQueryResults
                  - athena:StopQueryExecution
                  - athena:ListQueryExecutions
                  - athena:GetDataCatalog
                  - athena:ListDataCatalogs
                  - athena:ListDatabases
                  - athena:ListTableMetadata
                  - athena:GetTableMetadata
                Resource: '*'
              - Effect: Allow
                Action:
                  - glue:GetDatabase
                  - glue:GetDatabases
                  - glue:GetTable
                  - glue:GetTables
                  - glue:GetPartitions
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:PutObject
                Resource: 
                  - !Sub "arn:aws:s3:::${AthenaResultsBucket}"
                  - !Sub "arn:aws:s3:::${AthenaResultsBucket}/*"

  AthenaSQLGeneratorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "athena-sql-gen-${AWS::AccountId}"
      Runtime: python3.11
      Handler: lambda_function.lambda_handler
      Role: !GetAtt AthenaSQLGeneratorFunctionRole.Arn
      Timeout: 300
      MemorySize: 1024
      Environment:
        Variables:
          ATHENA_WORKGROUP: !Ref AthenaWorkgroup
          ATHENA_RESULTS_BUCKET: !Ref AthenaResultsBucket
          ATHENA_RESULTS_PREFIX: "athena-results/"
      Code: "action-groups/athena-sql-generator"
      Tags:
        - Key: Project
          Value: "hcls-agents-toolkit"
        - Key: Agent
          Value: "athena-sql-generator"

  AthenaSQLGeneratorFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref AthenaSQLGeneratorFunction
      Principal: bedrock.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:agent/*"

  ##################################################################
  # Bedrock Agent
  ##################################################################
  
  AthenaSQLGeneratorBedrockAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      AgentName: !Sub "${AWS::StackName}-athena-sql-generator"
      Description: "Agent specialized in generating and executing Athena SQL queries for healthcare data analysis"
      FoundationModel: !Ref BedrockModelId
      AgentResourceRoleArn:
        "Fn::If":
          - AgentIAMRoleCondition
          - !Ref AgentIAMRoleArn
          - "{{resolve:ssm:/bedrock/agent/role/arn:1}}"
      Instruction: |
        You are an Athena SQL Generator Agent specialized in healthcare and life sciences data analysis. Your primary role is to:

        1. **Generate SQL Queries**: Create optimized Athena SQL queries from natural language descriptions
        2. **Execute Queries**: Run SQL queries safely in Amazon Athena
        3. **Schema Analysis**: Analyze table schemas and suggest optimal query structures
        4. **Data Exploration**: Help users explore and understand their healthcare datasets
        5. **Performance Optimization**: Suggest query optimizations for better performance and cost efficiency

        Key capabilities:
        - Generate SQL for complex healthcare data queries including genomics, clinical trials, and patient data
        - Handle partitioned tables and optimize for Athena's columnar storage
        - Provide query cost estimates and performance recommendations
        - Support common healthcare data formats (FHIR, HL7, genomic formats)
        - Generate queries for biomarker analysis, patient cohort identification, and clinical outcome analysis
        - Create aggregation queries for population health analytics

        Safety features:
        - Only execute SELECT queries (no data modification)
        - Validate queries before execution
        - Implement query timeouts and result limits
        - Sanitize inputs to prevent SQL injection

        When responding:
        - Always explain the generated SQL query logic
        - Provide query performance tips when relevant
        - Suggest alternative query approaches when appropriate
        - Include estimated costs for large queries
        - Recommend appropriate partitioning strategies
        - Highlight any potential data privacy considerations

        Focus on healthcare-specific use cases including clinical research, genomics analysis, drug discovery, and population health studies.
      ActionGroups:
        - ActionGroupName: "sql-generation"
          Description: "Generate and execute Athena SQL queries"
          ActionGroupExecutor:
            Lambda: !GetAtt AthenaSQLGeneratorFunction.Arn
          ApiSchema:
            Payload: |
              {
                "openapi": "3.0.0",
                "info": {
                  "title": "Athena SQL Generator API",
                  "version": "1.0.0",
                  "description": "API for generating and executing Athena SQL queries"
                },
                "paths": {
                  "/generate": {
                    "post": {
                      "summary": "Generate SQL query from natural language",
                      "description": "Generate an Athena SQL query based on natural language description",
                      "operationId": "generateSQL",
                      "requestBody": {
                        "required": true,
                        "content": {
                          "application/json": {
                            "schema": {
                              "type": "object",
                              "properties": {
                                "action": {
                                  "type": "string",
                                  "enum": ["generate"],
                                  "default": "generate"
                                },
                                "description": {
                                  "type": "string",
                                  "description": "Natural language description of the desired query"
                                },
                                "database": {
                                  "type": "string",
                                  "description": "Database name",
                                  "default": "default"
                                },
                                "tables": {
                                  "type": "array",
                                  "items": {"type": "string"},
                                  "description": "List of tables to include in the query"
                                }
                              },
                              "required": ["description"]
                            }
                          }
                        }
                      },
                      "responses": {
                        "200": {
                          "description": "Successful query generation",
                          "content": {
                            "application/json": {
                              "schema": {
                                "type": "object",
                                "properties": {
                                  "sql": {"type": "string"},
                                  "explanation": {"type": "string"}
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  },
                  "/execute": {
                    "post": {
                      "summary": "Execute SQL query on Athena",
                      "description": "Execute a SQL query on Amazon Athena and return the results",
                      "operationId": "executeSQL",
                      "requestBody": {
                        "required": true,
                        "content": {
                          "application/json": {
                            "schema": {
                              "type": "object",
                              "properties": {
                                "action": {
                                  "type": "string",
                                  "enum": ["execute"],
                                  "default": "execute"
                                },
                                "sql": {
                                  "type": "string",
                                  "description": "SQL query to execute"
                                },
                                "database": {
                                  "type": "string",
                                  "description": "Database name",
                                  "default": "default"
                                }
                              },
                              "required": ["sql"]
                            }
                          }
                        }
                      },
                      "responses": {
                        "200": {
                          "description": "Successful query execution",
                          "content": {
                            "application/json": {
                              "schema": {
                                "type": "object",
                                "properties": {
                                  "columns": {"type": "array"},
                                  "rows": {"type": "array"},
                                  "execution_time": {"type": "number"},
                                  "data_scanned": {"type": "string"}
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  },
                  "/schema": {
                    "post": {
                      "summary": "Get database schema",
                      "description": "Retrieve database schema information from Glue Data Catalog",
                      "operationId": "getSchema",
                      "requestBody": {
                        "required": true,
                        "content": {
                          "application/json": {
                            "schema": {
                              "type": "object",
                              "properties": {
                                "action": {
                                  "type": "string",
                                  "enum": ["schema"],
                                  "default": "schema"
                                },
                                "database": {
                                  "type": "string",
                                  "description": "Database name",
                                  "default": "default"
                                }
                              }
                            }
                          }
                        }
                      },
                      "responses": {
                        "200": {
                          "description": "Successful schema retrieval",
                          "content": {
                            "application/json": {
                              "schema": {
                                "type": "object",
                                "properties": {
                                  "database": {"type": "string"},
                                  "tables": {"type": "object"}
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
      Tags:
        Project: "hcls-agents-toolkit"
        Agent: "athena-sql-generator"

  AgentAliasResource:
    Type: AWS::Bedrock::AgentAlias
    Condition: CreateAgentAliasCondition
    Properties:
      AgentId: !GetAtt AthenaSQLGeneratorBedrockAgent.AgentId
      AgentAliasName: !Ref AgentAliasName

Outputs:
  AgentId:
    Description: Agent ID
    Value: !Ref AthenaSQLGeneratorBedrockAgent
  AgentAliasId:
    Description: Agent Alias ID
    Value: !GetAtt AgentAliasResource.AgentAliasId
    Condition: CreateAgentAliasCondition
  AgentAliasArn:
    Description: Agent Alias ARN
    Value: !GetAtt AgentAliasResource.AgentAliasArn
    Condition: CreateAgentAliasCondition
  LambdaFunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt AthenaSQLGeneratorFunction.Arn
