AWSTemplateFormatVersion: '2010-09-09'
Description: 'Athena SQL Generator Agent for HCLS Agents Toolkit'

Parameters:
  AgentIAMRoleArn:
    Type: String
    Description: "ARN of the IAM role for the Bedrock agent and Lambda function"
  
  S3CodeBucket:
    Type: String
    Description: "S3 bucket containing the agent code"
  
  S3CodeKey:
    Type: String
    Description: "S3 key prefix for the agent code"
    Default: "repo"
  
  BedrockModelId:
    Type: String
    Description: "The ID of the Foundation Model to use for the Agent"
    Default: "us.anthropic.claude-3-5-sonnet-20241022-v2:0"
  
  AthenaWorkgroup:
    Type: String
    Description: "Athena workgroup to use for queries"
    Default: "primary"
  
  AthenaResultsBucket:
    Type: String
    Description: "S3 bucket for Athena query results"

Resources:
  ##################################################################
  # Lambda Function for Athena SQL Generation and Execution
  ##################################################################
  
  AthenaSQLGeneratorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "athena-sql-gen-${AWS::AccountId}"
      Runtime: python3.11
      Handler: lambda_function.lambda_handler
      Role: !Ref AgentIAMRoleArn
      Timeout: 300
      MemorySize: 1024
      Environment:
        Variables:
          ATHENA_WORKGROUP: !Ref AthenaWorkgroup
          ATHENA_RESULTS_BUCKET: !Ref AthenaResultsBucket
          ATHENA_RESULTS_PREFIX: "athena-results/"
      Code: "action-groups/athena-sql-generator"
      Tags:
        - Key: Project
          Value: "hcls-agents-toolkit"
        - Key: Agent
          Value: "athena-sql-generator"

  ##################################################################
  # Bedrock Agent
  ##################################################################
  
  AthenaSQLGeneratorBedrockAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      AgentName: !Sub "${AWS::StackName}-athena-sql-generator"
      Description: "Agent specialized in generating and executing Athena SQL queries for healthcare data analysis"
      FoundationModel: !Ref BedrockModelId
      AgentResourceRoleArn: !Ref AgentIAMRoleArn
      Instruction: |
        You are an Athena SQL Generator Agent specialized in healthcare and life sciences data analysis. Your primary role is to:

        1. **Generate SQL Queries**: Create optimized Athena SQL queries from natural language descriptions
        2. **Execute Queries**: Run SQL queries safely in Amazon Athena
        3. **Schema Analysis**: Analyze table schemas and suggest optimal query structures
        4. **Data Exploration**: Help users explore and understand their healthcare datasets
        5. **Performance Optimization**: Suggest query optimizations for better performance and cost efficiency

        Key capabilities:
        - Generate SQL for complex healthcare data queries including genomics, clinical trials, and patient data
        - Handle partitioned tables and optimize for Athena's columnar storage
        - Provide query cost estimates and performance recommendations
        - Support common healthcare data formats (FHIR, HL7, genomic formats)
        - Generate queries for biomarker analysis, patient cohort identification, and clinical outcome analysis
        - Create aggregation queries for population health analytics

        Safety features:
        - Only execute SELECT queries (no data modification)
        - Validate queries before execution
        - Implement query timeouts and result limits
        - Sanitize inputs to prevent SQL injection

        When responding:
        - Always explain the generated SQL query logic
        - Provide query performance tips when relevant
        - Suggest alternative query approaches when appropriate
        - Include estimated costs for large queries
        - Recommend appropriate partitioning strategies
        - Highlight any potential data privacy considerations

        Focus on healthcare-specific use cases including clinical research, genomics analysis, drug discovery, and population health studies.
      ActionGroups:
        - ActionGroupName: "sql-generation"
          Description: "Generate and execute Athena SQL queries"
          ActionGroupExecutor:
            Lambda: !GetAtt AthenaSQLGeneratorFunction.Arn
          ApiSchema:
            Payload: |
              {
                "openapi": "3.0.0",
                "info": {
                  "title": "Athena SQL Generator API",
                  "version": "1.0.0",
                  "description": "API for generating and executing Athena SQL queries"
                },
                "paths": {
                  "/generate": {
                    "post": {
                      "summary": "Generate SQL query from natural language",
                      "description": "Generate an Athena SQL query based on natural language description",
                      "operationId": "generateSQL",
                      "requestBody": {
                        "required": true,
                        "content": {
                          "application/json": {
                            "schema": {
                              "type": "object",
                              "properties": {
                                "action": {
                                  "type": "string",
                                  "enum": ["generate"],
                                  "default": "generate"
                                },
                                "description": {
                                  "type": "string",
                                  "description": "Natural language description of the desired query"
                                },
                                "database": {
                                  "type": "string",
                                  "description": "Database name",
                                  "default": "default"
                                },
                                "tables": {
                                  "type": "array",
                                  "items": {"type": "string"},
                                  "description": "List of table names to include in query generation"
                                }
                              },
                              "required": ["description"]
                            }
                          }
                        }
                      },
                      "responses": {
                        "200": {
                          "description": "Successfully generated SQL query",
                          "content": {
                            "application/json": {
                              "schema": {
                                "type": "object",
                                "properties": {
                                  "description": {"type": "string"},
                                  "database": {"type": "string"},
                                  "generated_sql": {"type": "string"},
                                  "table_schemas": {"type": "object"},
                                  "timestamp": {"type": "string"}
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  },
                  "/execute": {
                    "post": {
                      "summary": "Execute SQL query in Athena",
                      "description": "Execute a SQL query in Amazon Athena and return results",
                      "operationId": "executeSQL",
                      "requestBody": {
                        "required": true,
                        "content": {
                          "application/json": {
                            "schema": {
                              "type": "object",
                              "properties": {
                                "action": {
                                  "type": "string",
                                  "enum": ["execute"],
                                  "default": "execute"
                                },
                                "sql_query": {
                                  "type": "string",
                                  "description": "SQL query to execute"
                                },
                                "database": {
                                  "type": "string",
                                  "description": "Database name",
                                  "default": "default"
                                }
                              },
                              "required": ["sql_query"]
                            }
                          }
                        }
                      },
                      "responses": {
                        "200": {
                          "description": "Query executed successfully",
                          "content": {
                            "application/json": {
                              "schema": {
                                "type": "object",
                                "properties": {
                                  "query_execution_id": {"type": "string"},
                                  "status": {"type": "string"},
                                  "results": {"type": "object"},
                                  "row_count": {"type": "integer"},
                                  "execution_time_ms": {"type": "integer"}
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  },
                  "/describe-tables": {
                    "post": {
                      "summary": "List tables in database",
                      "description": "Get list of tables in the specified database",
                      "operationId": "describeTables",
                      "requestBody": {
                        "required": true,
                        "content": {
                          "application/json": {
                            "schema": {
                              "type": "object",
                              "properties": {
                                "action": {
                                  "type": "string",
                                  "enum": ["describe_tables"],
                                  "default": "describe_tables"
                                },
                                "database": {
                                  "type": "string",
                                  "description": "Database name",
                                  "default": "default"
                                }
                              }
                            }
                          }
                        }
                      },
                      "responses": {
                        "200": {
                          "description": "Tables listed successfully",
                          "content": {
                            "application/json": {
                              "schema": {
                                "type": "object",
                                "properties": {
                                  "database": {"type": "string"},
                                  "tables": {"type": "array"},
                                  "table_count": {"type": "integer"}
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  },
                  "/get-schema": {
                    "post": {
                      "summary": "Get table schema",
                      "description": "Get detailed schema information for a specific table",
                      "operationId": "getTableSchema",
                      "requestBody": {
                        "required": true,
                        "content": {
                          "application/json": {
                            "schema": {
                              "type": "object",
                              "properties": {
                                "action": {
                                  "type": "string",
                                  "enum": ["get_schema"],
                                  "default": "get_schema"
                                },
                                "database": {
                                  "type": "string",
                                  "description": "Database name",
                                  "default": "default"
                                },
                                "table_name": {
                                  "type": "string",
                                  "description": "Table name"
                                }
                              },
                              "required": ["table_name"]
                            }
                          }
                        }
                      },
                      "responses": {
                        "200": {
                          "description": "Schema retrieved successfully",
                          "content": {
                            "application/json": {
                              "schema": {
                                "type": "object",
                                "properties": {
                                  "database": {"type": "string"},
                                  "table_name": {"type": "string"},
                                  "schema": {"type": "object"}
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
      Tags:
        Project: "hcls-agents-toolkit"
        Agent: "athena-sql-generator"

  ##################################################################
  # Lambda Permission for Bedrock Agent
  ##################################################################
  
  AthenaSQLGeneratorFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref AthenaSQLGeneratorFunction
      Action: lambda:InvokeFunction
      Principal: bedrock.amazonaws.com
      SourceArn: !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:agent/${AthenaSQLGeneratorBedrockAgent}"

  ##################################################################
  # Agent Alias
  ##################################################################
  
  AthenaSQLGeneratorAgentAlias:
    Type: AWS::Bedrock::AgentAlias
    Properties:
      AgentId: !Ref AthenaSQLGeneratorBedrockAgent
      AgentAliasName: "PROD"
      Description: "Production alias for Athena SQL Generator Agent"
      Tags:
        Project: "hcls-agents-toolkit"
        Agent: "athena-sql-generator"

Outputs:
  AgentId:
    Description: "Athena SQL Generator Agent ID"
    Value: !Ref AthenaSQLGeneratorBedrockAgent
    Export:
      Name: !Sub "${AWS::StackName}-AgentId"
  
  AgentAliasId:
    Description: "Athena SQL Generator Agent Alias ID"
    Value: !GetAtt AthenaSQLGeneratorAgentAlias.AgentAliasId
    Export:
      Name: !Sub "${AWS::StackName}-AgentAliasId"
  
  AgentAliasArn:
    Description: "Athena SQL Generator Agent Alias ARN"
    Value: !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:agent-alias/${AthenaSQLGeneratorBedrockAgent}/${AthenaSQLGeneratorAgentAlias}"
    Export:
      Name: !Sub "${AWS::StackName}-AgentAliasArn"
  
  LambdaFunctionArn:
    Description: "Athena SQL Generator Lambda Function ARN"
    Value: !GetAtt AthenaSQLGeneratorFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-LambdaFunctionArn"
