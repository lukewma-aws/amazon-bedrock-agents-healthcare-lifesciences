AWSTemplateFormatVersion: "2010-09-09"
Description: Creates the Biomarker Database Analyst agent for analyzing structured clinical and RNA-seq data by converting natural language questions to SQL statements and executing them on Amazon Redshift.

Parameters:
  AgentAliasName:
    Type: String
    Default: "Latest"
    Description: Name for the agent alias
  BedrockModelId:
    Type: String
    Description: The ID of the Foundation Model to use for the Agent
    Default: us.anthropic.claude-3-5-sonnet-20241022-v2:0
  AgentIAMRoleArn:
    Type: String
    Description: (Optional) Amazon Bedrock Agents service role ARN
    Default: ""
  RedshiftClusterIdentifier:
    Type: String
    Description: Redshift cluster identifier for database queries
    Default: ""
  RedshiftDatabaseName:
    Type: String
    Description: Redshift database name
    Default: "dev"
  RedshiftUsername:
    Type: String
    Description: Redshift username for database access
    Default: "admin"
  RedshiftPassword:
    Type: String
    Description: Redshift password for database access
    NoEcho: true
    Default: ""

Conditions:
  CreateAgentAliasCondition: !Not [!Equals [!Ref AgentAliasName, ""]]
  AgentIAMRoleCondition: !Not [!Equals [!Ref AgentIAMRoleArn, ""]]
  RedshiftConfigured: !Not [!Equals [!Ref RedshiftClusterIdentifier, ""]]

Resources:
  ########################
  ##### Database Query #####
  ########################

  DatabaseQueryLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: RedshiftDataAccess
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - redshift-data:ExecuteStatement
                  - redshift-data:DescribeStatement
                  - redshift-data:GetStatementResult
                  - redshift-data:ListStatements
                  - redshift:GetClusterCredentials
                  - redshift:DescribeClusters
                Resource: "*"
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: "*"

  DatabaseQueryLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}-database-query"
      RetentionInDays: 14

  DatabaseQueryLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-DatabaseQuery"
      Role: !GetAtt DatabaseQueryLambdaRole.Arn
      Runtime: python3.12
      Handler: lambda_function.lambda_handler
      Timeout: 300
      MemorySize: 1024
      Environment:
        Variables:
          LOG_LEVEL: "INFO"
          REDSHIFT_CLUSTER_ID: !Ref RedshiftClusterIdentifier
          REDSHIFT_DATABASE: !Ref RedshiftDatabaseName
          REDSHIFT_USERNAME: !Ref RedshiftUsername
      Code:
        ZipFile: |
          import json
          import logging
          import boto3
          import time
          import os
          from typing import Dict, List, Any, Optional

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          # Initialize AWS clients
          redshift_data = boto3.client('redshift-data')

          def lambda_handler(event, context):
              """
              Lambda function to execute SQL queries on Redshift database
              """
              try:
                  logger.info(f"Received event: {json.dumps(event)}")
                  
                  # Extract parameters from the event
                  parameters = event.get('parameters', [])
                  param_dict = {param['name']: param['value'] for param in parameters}
                  
                  action = param_dict.get('action', '')
                  
                  if action == 'get_schema':
                      result = get_database_schema()
                  elif action == 'execute_query':
                      query = param_dict.get('query', '')
                      result = execute_sql_query(query)
                  elif action == 'validate_query':
                      query = param_dict.get('query', '')
                      result = validate_sql_query(query)
                  else:
                      result = {'error': f'Unknown action: {action}'}
                  
                  return {
                      'response': {
                          'actionGroupInvocationOutput': {
                              'text': json.dumps(result, indent=2, default=str)
                          }
                      }
                  }
                  
              except Exception as e:
                  logger.error(f"Error in lambda_handler: {str(e)}")
                  return {
                      'response': {
                          'actionGroupInvocationOutput': {
                              'text': f'Error processing request: {str(e)}'
                          }
                      }
                  }

          def get_database_schema() -> Dict[str, Any]:
              """
              Get the database schema information
              """
              try:
                  cluster_id = os.environ.get('REDSHIFT_CLUSTER_ID')
                  database = os.environ.get('REDSHIFT_DATABASE')
                  username = os.environ.get('REDSHIFT_USERNAME')
                  
                  if not all([cluster_id, database, username]):
                      return {'error': 'Redshift configuration not complete'}
                  
                  # Query to get table information
                  schema_query = """
                  SELECT 
                      schemaname,
                      tablename,
                      column_name,
                      data_type,
                      is_nullable
                  FROM information_schema.columns 
                  WHERE schemaname NOT IN ('information_schema', 'pg_catalog')
                  ORDER BY schemaname, tablename, ordinal_position;
                  """
                  
                  response = redshift_data.execute_statement(
                      ClusterIdentifier=cluster_id,
                      Database=database,
                      DbUser=username,
                      Sql=schema_query
                  )
                  
                  statement_id = response['Id']
                  
                  # Wait for query completion
                  result = wait_for_query_completion(statement_id)
                  
                  if result.get('error'):
                      return result
                  
                  # Get query results
                  result_response = redshift_data.get_statement_result(Id=statement_id)
                  
                  # Process schema information
                  schema_info = {}
                  for record in result_response['Records']:
                      schema_name = record[0]['stringValue']
                      table_name = record[1]['stringValue']
                      column_name = record[2]['stringValue']
                      data_type = record[3]['stringValue']
                      is_nullable = record[4]['stringValue']
                      
                      if schema_name not in schema_info:
                          schema_info[schema_name] = {}
                      
                      if table_name not in schema_info[schema_name]:
                          schema_info[schema_name][table_name] = []
                      
                      schema_info[schema_name][table_name].append({
                          'column_name': column_name,
                          'data_type': data_type,
                          'is_nullable': is_nullable
                      })
                  
                  return {
                      'action': 'get_schema',
                      'schema': schema_info,
                      'message': 'Database schema retrieved successfully'
                  }
                  
              except Exception as e:
                  logger.error(f"Error getting database schema: {str(e)}")
                  return {'error': f'Failed to get database schema: {str(e)}'}

          def execute_sql_query(query: str) -> Dict[str, Any]:
              """
              Execute SQL query on Redshift
              """
              try:
                  cluster_id = os.environ.get('REDSHIFT_CLUSTER_ID')
                  database = os.environ.get('REDSHIFT_DATABASE')
                  username = os.environ.get('REDSHIFT_USERNAME')
                  
                  if not all([cluster_id, database, username]):
                      return {'error': 'Redshift configuration not complete'}
                  
                  if not query.strip():
                      return {'error': 'Query cannot be empty'}
                  
                  # Execute the query
                  response = redshift_data.execute_statement(
                      ClusterIdentifier=cluster_id,
                      Database=database,
                      DbUser=username,
                      Sql=query
                  )
                  
                  statement_id = response['Id']
                  
                  # Wait for query completion
                  result = wait_for_query_completion(statement_id)
                  
                  if result.get('error'):
                      return result
                  
                  # Get query results
                  result_response = redshift_data.get_statement_result(Id=statement_id)
                  
                  # Process results
                  columns = [col['name'] for col in result_response.get('ColumnMetadata', [])]
                  rows = []
                  
                  for record in result_response.get('Records', []):
                      row = []
                      for field in record:
                          if 'stringValue' in field:
                              row.append(field['stringValue'])
                          elif 'longValue' in field:
                              row.append(field['longValue'])
                          elif 'doubleValue' in field:
                              row.append(field['doubleValue'])
                          elif 'booleanValue' in field:
                              row.append(field['booleanValue'])
                          elif 'isNull' in field:
                              row.append(None)
                          else:
                              row.append(str(field))
                      rows.append(row)
                  
                  return {
                      'action': 'execute_query',
                      'query': query,
                      'columns': columns,
                      'rows': rows,
                      'row_count': len(rows),
                      'message': 'Query executed successfully'
                  }
                  
              except Exception as e:
                  logger.error(f"Error executing SQL query: {str(e)}")
                  return {'error': f'Failed to execute query: {str(e)}'}

          def validate_sql_query(query: str) -> Dict[str, Any]:
              """
              Validate SQL query syntax without executing it
              """
              try:
                  # Basic SQL validation
                  query = query.strip()
                  
                  if not query:
                      return {'valid': False, 'error': 'Query cannot be empty'}
                  
                  # Check for potentially dangerous operations
                  dangerous_keywords = ['DROP', 'DELETE', 'TRUNCATE', 'ALTER', 'CREATE', 'INSERT', 'UPDATE']
                  query_upper = query.upper()
                  
                  for keyword in dangerous_keywords:
                      if keyword in query_upper:
                          return {
                              'valid': False, 
                              'error': f'Query contains potentially dangerous operation: {keyword}'
                          }
                  
                  # Check if it's a SELECT statement
                  if not query_upper.strip().startswith('SELECT'):
                      return {
                          'valid': False,
                          'error': 'Only SELECT queries are allowed'
                      }
                  
                  return {
                      'valid': True,
                      'message': 'Query validation passed'
                  }
                  
              except Exception as e:
                  logger.error(f"Error validating SQL query: {str(e)}")
                  return {'valid': False, 'error': f'Validation error: {str(e)}'}

          def wait_for_query_completion(statement_id: str, max_wait_time: int = 60) -> Dict[str, Any]:
              """
              Wait for query completion with timeout
              """
              start_time = time.time()
              
              while time.time() - start_time < max_wait_time:
                  try:
                      response = redshift_data.describe_statement(Id=statement_id)
                      status = response['Status']
                      
                      if status == 'FINISHED':
                          return {'status': 'completed'}
                      elif status == 'FAILED':
                          error_msg = response.get('Error', 'Unknown error')
                          return {'error': f'Query failed: {error_msg}'}
                      elif status == 'ABORTED':
                          return {'error': 'Query was aborted'}
                      
                      # Wait before checking again
                      time.sleep(2)
                      
                  except Exception as e:
                      logger.error(f"Error checking query status: {str(e)}")
                      return {'error': f'Error checking query status: {str(e)}'}
              
              return {'error': 'Query timed out'}

  DatabaseQueryLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt DatabaseQueryLambdaFunction.Arn
      Principal: bedrock.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:agent/*

  #####################
  ##### Agent #####
  ###################

  BiomarkerDatabaseAnalystAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      ActionGroups:
        - ActionGroupName: "UserInputAction"
          ParentActionGroupSignature: "AMAZON.UserInput"
          ActionGroupState: "ENABLED"
        - ActionGroupName: DatabaseQuery
          Description: Query biomarker database using natural language converted to SQL
          ActionGroupExecutor:
            Lambda: !GetAtt DatabaseQueryLambdaFunction.Arn
          ActionGroupState: ENABLED
          FunctionSchema:
            Functions:
              - Name: get_database_schema
                Description: Retrieve the database schema information including tables, columns, and data types to understand the available data structure.
                Parameters: {}
              - Name: execute_sql_query
                Description: Execute a SQL SELECT query on the biomarker database to retrieve specific data based on natural language questions.
                Parameters:
                  query:
                    Description: "SQL SELECT query to execute on the database (only SELECT statements allowed)"
                    Type: string
                    Required: True
              - Name: validate_sql_query
                Description: Validate SQL query syntax and safety before execution to ensure it follows security guidelines.
                Parameters:
                  query:
                    Description: "SQL query to validate"
                    Type: string
                    Required: True
      AgentName: "Biomarker-Database-Analyst-Agent"
      AgentResourceRoleArn:
        "Fn::If":
          - AgentIAMRoleCondition
          - !Ref AgentIAMRoleArn
          - "{{resolve:ssm:/bedrock/agent/role/arn:1}}"
      AutoPrepare: True
      Description: "Analyzes structured clinical and RNA-seq data by converting natural language questions to SQL statements and executing them on Amazon Redshift database"
      FoundationModel: !Ref BedrockModelId
      GuardrailConfiguration:
        GuardrailIdentifier: !GetAtt BiomarkerDatabaseGuardrail.GuardrailId
        GuardrailVersion: !GetAtt BiomarkerDatabaseGuardrail.Version
      Instruction: |
        You are a biomarker database analyst specializing in analyzing structured clinical and RNA-seq data. Your role is to help users query and analyze biomarker databases by converting natural language questions into SQL statements and providing insights from the results.

        You have access to the following tools:

        - get_database_schema: Retrieve database schema information to understand available tables, columns, and data types
        - execute_sql_query: Execute SQL SELECT queries on the biomarker database
        - validate_sql_query: Validate SQL query syntax and safety before execution

        Analysis Process

        1. Start by understanding the user's question about the biomarker data
        2. Use get_database_schema to understand the available data structure if needed
        3. Convert the natural language question into appropriate SQL queries
        4. Validate queries using validate_sql_query before execution
        5. Execute queries using execute_sql_query to retrieve relevant data
        6. Analyze and interpret the results to answer the user's question
        7. Provide insights, trends, and statistical summaries as appropriate

        Database Context

        The database typically contains:
        - Clinical data: Patient demographics, diagnoses, treatments, outcomes
        - RNA-seq data: Gene expression levels, mutation data, pathway information
        - Biomarker data: Protein levels, metabolite concentrations, imaging features
        - Survival data: Time-to-event outcomes, progression-free survival

        Query Guidelines

        - Only use SELECT statements (no INSERT, UPDATE, DELETE, DROP, etc.)
        - Always validate queries before execution
        - Use appropriate WHERE clauses to filter data
        - Include GROUP BY and aggregate functions for summary statistics
        - Use JOINs when analyzing relationships between tables
        - Handle NULL values appropriately in calculations

        Response Guidelines

        - Provide clear, data-driven answers based on query results
        - Include relevant statistics (means, medians, counts, percentages)
        - Explain any data limitations or assumptions
        - Suggest follow-up analyses when appropriate
        - Present results in a structured format with clear interpretations
        - Always cite the specific data sources and sample sizes

        Example Analysis Areas

        - Patient demographics and clinical characteristics
        - Biomarker expression patterns and distributions
        - Correlation between biomarkers and clinical outcomes
        - Survival analysis and prognostic factors
        - Treatment response patterns
        - Mutation frequencies and associations

  AgentAliasResource:
    Type: AWS::Bedrock::AgentAlias
    Condition: CreateAgentAliasCondition
    Properties:
      AgentId: !GetAtt BiomarkerDatabaseAnalystAgent.AgentId
      AgentAliasName: !Ref AgentAliasName

  BiomarkerDatabaseGuardrail:
    Type: AWS::Bedrock::Guardrail
    Properties:
      BlockedInputMessaging: "Sorry, your query violates our usage policies."
      BlockedOutputsMessaging: "Sorry, I am unable to reply because the output violates our usage policies."
      ContentPolicyConfig:
        FiltersConfig:
          - InputStrength: "HIGH"
            OutputStrength: "HIGH"
            Type: "MISCONDUCT"
          - InputStrength: "HIGH"
            OutputStrength: "NONE"
            Type: "PROMPT_ATTACK"
      Description: Guardrail for Biomarker Database Analyst agent to block harmful content.
      Name: BiomarkerDatabaseAnalystGuardrail
      WordPolicyConfig:
        ManagedWordListsConfig:
          - Type: PROFANITY

Outputs:
  AgentId:
    Description: Agent ID
    Value: !Ref BiomarkerDatabaseAnalystAgent
  AgentAliasId:
    Description: Agent Alias ID
    Value: !GetAtt AgentAliasResource.AgentAliasId
    Condition: CreateAgentAliasCondition
  AgentAliasArn:
    Description: Agent Alias ARN
    Value: !GetAtt AgentAliasResource.AgentAliasArn
    Condition: CreateAgentAliasCondition
  DatabaseQueryLambdaFunctionArn:
    Description: Database Query Lambda Function ARN
    Value: !GetAtt DatabaseQueryLambdaFunction.Arn
